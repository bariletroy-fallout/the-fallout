name: Fetch Substack Articles

on:
  workflow_dispatch:

jobs:
  fetch-and-convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install rss-parser turndown
      - run: node fetch.js
      - run: git config user.name "GitHub Actions"
      - run: git config user.email "actions@github.com"
      - run: git add articles/
      - run: git commit -m "Update articles" --allow-empty
      - run: git push
